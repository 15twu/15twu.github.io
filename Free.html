<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[root] LiveBoot - Firebase Sync Selector</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #000000; color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", sans-serif;
            overflow: hidden; height: 100vh; width: 100vw; position: relative;
        }

        /* ======= 1. LiveBoot 畫面 ======= */
        .boot-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000000; font-family: 'Courier New', Courier, monospace;
            font-size: 11px; line-height: 1.2; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 12px; z-index: 10; transition: opacity 0.5s ease-in-out;
            pointer-events: none;
        }
        .android-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.45); font-size: 75px; font-weight: 300; letter-spacing: -2px; z-index: 5; font-family: sans-serif;
        }
        #logContainer { z-index: 6; width: 100%; }
        .log-line { white-space: nowrap; width: 100%; text-align: left; margin-bottom: 1px; }

        /* ======= 2. 電郵驗證彈窗 ======= */
        .auth-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000000;
            z-index: 12; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .auth-box { width: 100%; max-width: 360px; background-color: #1f1f1f; border-radius: 16px; padding: 25px; text-align: center; border: 1px solid #333; }
        .auth-title { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
        .auth-subtitle { font-size: 12px; color: #888; margin-bottom: 20px; }
        .auth-input { width: 100%; background-color: #2d2d2d; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; font-size: 14px; outline: none; text-align: center; margin-bottom: 16px; user-select: text !important; }
        .auth-input:focus { border-color: #00a174; }
        .auth-btn { width: 100%; background-color: #00a174; color: #000; border: none; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .auth-btn:disabled { background-color: #444; color: #888; cursor: not-allowed; }
        .debug-url-info { font-size: 10px; color: #666; margin-top: 15px; word-break: break-all; }
        .force-btn { display: inline-block; margin-top: 8px; color: #00a174; font-size: 11px; text-decoration: underline; cursor: pointer; pointer-events: auto !important; }

        /* ======= 3. 鋪平優化選擇視窗 ======= */
        .selector-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6);
            z-index: 8; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 15px;
        }
        .selector-box { width: 100%; max-width: 440px; background-color: #1f1f1f; border-radius: 20px; padding: 20px; box-shadow: 0 5px 25px rgba(0,0,0,0.7); border: 1px solid #2d2d2d; }
        .selector-title { font-size: 16px; color: #fff; margin-bottom: 15px; font-weight: 500; text-align: center; letter-spacing: 0.5px; }
        .group-label { font-size: 11px; color: #00a174; font-weight: bold; text-transform: uppercase; margin: 10px 0 6px 4px; text-align: left; }
        
        .option-btn {
            width: 100%; background-color: #2d2d2d; border: 1px solid #3d3d3d; color: #fff; padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; font-size: 14px; text-align: left; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; transition: background 0.2s;
        }
        .option-btn:active:not(.disabled) { background-color: #3d3d3d; }
        .option-btn.disabled { background-color: #151515; border-color: #222; color: #555; cursor: not-allowed; pointer-events: none; }

        .badge { font-size: 10px; padding: 2px 6px; border-radius: 8px; font-weight: bold; }
        .badge.available { background-color: #00a174; color: #000; }
        .badge.in-use { background-color: #ffaa00; color: #000; }
        .badge.expired { background-color: #331111; color: #ff3333; }

        /* ======= 4. Iframe 容器 ======= */
        .vmos-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background-color: #000000; }
        .vmos-frame { width: 100%; height: 100%; border: none; }

        .booted .boot-screen { opacity: 0 !important; pointer-events: none !important; display: none !important; }
        .show-selector .selector-screen { opacity: 1; pointer-events: auto; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="boot-screen" id="bootScreen">
        <div class="android-watermark">android</div>
        <div id="logContainer"></div>
    </div>

    <div class="auth-screen" id="authScreen" style="display: none;">
        <div class="auth-box">
            <div class="auth-title">System Authentication</div>
            <div class="auth-subtitle">Please enter your authorized Mail to verify access</div>
            <input type="email" class="auth-input" id="emailInput" placeholder="example@icloud.com">
            <button class="auth-btn" id="verifyBtn" onclick="verifyEmailWithFirebase()">Verify & Open Systems</button>
            
            <div class="debug-url-info" id="debugUrlDisplay">Connecting...</div>
            <div class="force-btn" onclick="forceResetDatabase()">[ Force Sync Database Structure ]</div>
        </div>
    </div>

    <div class="selector-screen" id="selectorScreen">
        <div class="selector-box">
            <div class="selector-title">🖥️ Select VM OS Device Cloud</div>
            
            <div class="group-label">🎮 Game Mode</div>
            <button class="option-btn" id="btnGameA" onclick="launchVM('game_mode_a', 'https://cloud.vsphone.com/screen/share/FFC7-0B02-A4E0-4ED5-8949-45F8-5BFB-A8C8')">
                <span>Game Device VM-OS A</span>
                <span class="badge available" id="badgeGameA">Ready</span>
            </button>
            <button class="option-btn" id="btnGameB" onclick="launchVM('game_mode_b', 'https://cloud.vsphone.com/screen/share/F255-E2B7-11D5-4D3F-9B3B-44B3-E3F1-A928')">
                <span>Game Device VM-OS B</span>
                <span class="badge available" id="badgeGameB">Ready</span>
            </button>

            <div class="group-label">📱 Normal Mode</div>
            <button class="option-btn" id="btnSubA" onclick="launchVM('normal_vma', 'https://cloud.vmoscloud.com/screen/share/E8F5-DD3C-9CBD-4FEB-BF19-C94E-643C-C072')">
                <span>Normal Device VM-OS A</span>
                <span class="badge available" id="badgeSubA">Ready</span>
            </button>
            <button class="option-btn" id="btnSubB" onclick="launchVM('normal_vmb', 'https://cloud.vmoscloud.com/screen/share/5764-0A2D-3166-4D50-AA0B-9972-0786-8721')">
                <span>Normal Device VM-OS B</span>
                <span class="badge available" id="badgeSubB">Ready</span>
            </button>
            
            <div style="text-align: center; margin-top: 18px;">
                <a href="mailto:lccs2023058@icloud.com?subject=VMOS%20Support" style="color: #555; font-size: 11px; text-decoration: none;">Need help? Contact Admin</a>
            </div>
        </div>
    </div>

    <div class="vmos-container">
        <iframe class="vmos-frame" id="vmosFrame" src="" allow="autoplay; fullscreen"></iframe>
    </div>

<script>
    const TARGET_DB_URL = "https://omg-omygot-default-rtdb.asia-southeast1.firebasedatabase.app";
    
    const firebaseConfig = { databaseURL: TARGET_DB_URL };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const EXPIRE_GAME = new Date().getTime() + 24 * 60 * 60 * 1000;   
    const EXPIRE_NORMAL = new Date().getTime() + 24 * 60 * 60 * 1000; 

    let currentUserEmailClean = ""; 
    let activeNodeKey = null; 
    const container = document.getElementById('logContainer');

    function checkAndBoot() {
        document.getElementById('debugUrlDisplay').innerText = "Connected DB: " + TARGET_DB_URL;
        startLiveBoot();
    }

    function startLiveBoot() {
        const logTemplates = [
            "D/AndroidRuntime( 5650): Syncing connection protocols...",
            "I/LoadBalancer(  102): Handshaking with Firebase cluster...",
            "D/LiveBoot( 5650): Realtime listener operational."
        ];
        const bootTimer = setInterval(() => {
            const line = document.createElement('div'); line.className = `log-line`;
            line.innerText = logTemplates[Math.floor(Math.random() * logTemplates.length)];
            container.appendChild(line);
            if (container.children.length > 25) container.removeChild(container.firstChild);
        }, 60);

        setTimeout(() => {
            clearInterval(bootTimer);
            document.getElementById('bootScreen').style.display = 'none'; 
            document.getElementById('authScreen').style.display = 'flex'; 
        }, 3000);
    }

    function forceResetDatabase() {
        database.ref('status').set({
            game_mode_a: { in_use: false, current_user: "" },
            game_mode_b: { in_use: false, current_user: "" },
            normal_vma: { in_use: false, current_user: "" },
            normal_vmb: { in_use: false, current_user: "" }
        }).then(() => {
            alert("✅ [SUCCESS] Correct database structure has been injected successfully!");
        }).catch((err) => {
            alert("❌ [FAILED] Inject error: " + err.message);
        });
    }

    function accessGranted() {
        document.getElementById('authScreen').style.display = 'none'; 
        document.body.classList.add("booted");
        document.body.classList.add("show-selector"); 
        startRealtimeListen(); 
    }

    function verifyEmailWithFirebase() {
        const emailInput = document.getElementById('emailInput').value.trim().toLowerCase();
        if(!emailInput) return alert("Please enter your email!");
        
        currentUserEmailClean = emailInput.replace(/\./g, '_').replace(/@/g, '_');
        document.getElementById('verifyBtn').disabled = true;

        if (currentUserEmailClean === "lccs2023058_icloud_com" || 
            currentUserEmailClean === "systemcloud_gmail_icon" || 
            currentUserEmailClean === "systemcloud_gmail_com") {
            accessGranted();
            return;
        }

        database.ref('users/' + currentUserEmailClean).once('value').then((snapshot) => {
            if (snapshot.exists() && snapshot.val() === true) {
                accessGranted();
            } else {
                alert("Unauthorized Mail Access! Permission Denied.");
                document.getElementById('verifyBtn').disabled = false;
            }
        }).catch(() => {
            alert("Firebase connection error.");
            document.getElementById('verifyBtn').disabled = false;
        });
    }

    function startRealtimeListen() {
        database.ref('status').on('value', (snapshot) => {
            const status = snapshot.val() || {};
            const now = new Date().getTime();

            // Game A
            if (status.game_mode_a?.in_use && status.game_mode_a?.current_user !== currentUserEmailClean) {
                setBtnState('btnGameA', 'badgeGameA', 'In Use', 'in-use', true);
            } else { setBtnState('btnGameA', 'badgeGameA', 'Ready', 'available', false); }

            // Game B
            if (status.game_mode_b?.in_use && status.game_mode_b?.current_user !== currentUserEmailClean) {
                setBtnState('btnGameB', 'badgeGameB', 'In Use', 'in-use', true);
            } else { setBtnState('btnGameB', 'badgeGameB', 'Ready', 'available', false); }

            // Normal A
            if (status.normal_vma?.in_use && status.normal_vma?.current_user !== currentUserEmailClean) {
                setBtnState('btnSubA', 'badgeSubA', 'In Use', 'in-use', true);
            } else { setBtnState('btnSubA', 'badgeSubA', 'Ready', 'available', false); }

            // Normal B
            if (status.normal_vmb?.in_use && status.normal_vmb?.current_user !== currentUserEmailClean) {
                setBtnState('btnSubB', 'badgeSubB', 'In Use', 'in-use', true);
            } else { setBtnState('btnSubB', 'badgeSubB', 'Ready', 'available', false); }
        });
    }

    function setBtnState(btnId, badgeId, text, className, isDisable) {
        const btn = document.getElementById(btnId); const badge = document.getElementById(badgeId);
        if(isDisable) btn.classList.add('disabled'); else btn.classList.remove('disabled');
        badge.innerText = text; badge.className = `badge ${className}`;
    }

    function launchVM(nodeKey, url) {
        activeNodeKey = nodeKey;
        database.ref('status/' + nodeKey).set({
            in_use: true,
            current_user: currentUserEmailClean
        }).then(() => {
            document.getElementById('vmosFrame').src = url;
            document.body.classList.remove("show-selector");
        });
    }

    window.addEventListener('beforeunload', () => {
        if (activeNodeKey) {
            database.ref('status/' + activeNodeKey).set({ in_use: false, current_user: "" });
        }
    });

    checkAndBoot();
</script>
</body>
</html>
