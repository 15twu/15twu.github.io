<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[root] LiveBoot - Mode Selector</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* ======= 1. LiveBoot 畫面 ======= */
        .boot-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            line-height: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 12px;
            z-index: 10;
            transition: opacity 0.5s ease-in-out;
        }

        .android-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.45); 
            font-size: 75px;
            font-weight: 300;
            letter-spacing: -2px;
            z-index: 5;
            font-family: sans-serif;
        }

        #logContainer { z-index: 6; width: 100%; }
        .log-line { white-space: nowrap; width: 100%; text-align: left; margin-bottom: 1px; }
        .i { color: #ffffff; } .d { color: #00bfff; } .w { color: #ffff00; } .e { color: #ff0000; } .g { color: #7f7f7f; }
        .error-fatal { color: #ff3333; font-weight: bold; }

        .fatal-contact-box {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: none;
            text-align: center;
        }

        /* ======= 2. Android 原生選擇視窗 ======= */
        .selector-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            z-index: 8;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .selector-box {
            width: 100%;
            max-width: 450px;
            background-color: #1f1f1f;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0, 1, 0.2, 1);
        }

        .menu-panel { display: none; }
        .menu-panel.active { display: block; }

        .selector-title {
            font-size: 18px;
            color: #fff;
            margin-bottom: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .back-btn {
            background: none;
            border: none;
            color: #00a174;
            font-size: 20px;
            margin-right: 10px;
            cursor: pointer;
        }

        .option-btn {
            width: 100%;
            background-color: #2d2d2d;
            border: 1px solid #3d3d3d;
            color: #fff;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 12px;
            font-size: 15px;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .option-btn:active:not(.disabled) { background-color: #3d3d3d; }
        
        .option-btn.disabled {
            background-color: #151515;
            border-color: #222;
            color: #555;
            cursor: not-allowed;
            pointer-events: none;
        }
        .option-btn.disabled .badge {
            background-color: #331111;
            color: #ff3333;
        }

        .badge {
            font-size: 11px;
            background-color: #00a174;
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .contact-btn {
            display: inline-block;
            background-color: #00a174;
            color: #000000;
            padding: 12px 24px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,161,116,0.3);
            pointer-events: auto !important;
        }
        .contact-btn:active { background-color: #007c58; }

        /* ======= 3. 雲手機外嵌容器 ======= */
        .vmos-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-color: #000000;
        }
        .vmos-frame { width: 100%; height: 100%; border: none; }

        .booted .boot-screen { opacity: 0; pointer-events: none; }
        .show-selector .selector-screen { opacity: 1; pointer-events: auto; }
        .show-selector .selector-box { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="boot-screen" id="bootScreen">
        <div class="android-watermark">android</div>
        <div id="logContainer"></div>
        
        <div class="fatal-contact-box" id="fatalContact">
            <a href="mailto:lccs2023058@icloud.com?subject=VMOS%20Access%20Renewal" class="contact-btn">Contact Administrator</a>
        </div>
    </div>

    <div class="selector-screen" id="selectorScreen">
        <div class="selector-box">
            
            <div class="menu-panel active" id="mainMenu">
                <div class="selector-title">Select System Mode</div>
                
                <button class="option-btn" id="btnGameMode" onclick="launchVM('https://cloud.vsphone.com/screen/share/FFC7-0B02-A4E0-4ED5-8949-45F8-5BFB-A8C8')">
                    <span>🎮 遊戲模式 (Game Mode)</span>
                    <span class="badge" id="badgeGame">Available</span>
                </button>

                <button class="option-btn" id="btnNormalMode" onclick="switchMenu('normalMenu')">
                    <span>📱 普通模式 (Normal Mode)</span>
                    <span class="badge" id="badgeNormal">Available</span>
                </button>
            </div>

            <div class="menu-panel" id="normalMenu">
                <div class="selector-title">
                    <button class="back-btn" onclick="switchMenu('mainMenu')">‹</button>
                    Select VM OS Device
                </div>
                
                <button class="option-btn vmos-sub-btn" onclick="launchVM('https://cloud.vmoscloud.com/screen/share/E8F5-DD3C-9CBD-4FEB-BF19-C94E-643C-C072')">
                    <span>Device VM-OS A</span>
                    <span class="badge">Link 1</span>
                </button>

                <button class="option-btn vmos-sub-btn" onclick="launchVM('https://cloud.vmoscloud.com/screen/share/5764-0A2D-3166-4D50-AA0B-9972-0786-8721')">
                    <span>Device VM-OS B</span>
                    <span class="badge">Link 2</span>
                </button>
            </div>
            
            <div style="text-align: center; margin-top: 15px;">
                <a href="mailto:lccs2023058@icloud.com?subject=VMOS%20Support" style="color: #00a174; font-size: 13px; text-decoration: none;">Need help? Contact Admin</a>
            </div>
        </div>
    </div>

    <div class="vmos-container">
        <iframe class="vmos-frame" id="vmosFrame" src="" allow="autoplay; fullscreen"></iframe>
    </div>

<script>
    // ======= 精確同步 16:10:11 的絕對時間戳死線 =======
    const EXPIRE_GAME = 1782381911000;   // 1小時55分鐘後 (18:05:11 HKT)
    const EXPIRE_NORMAL = 1782382031000; // 1小時57分鐘後 (18:07:11 HKT)
    
    const container = document.getElementById('logContainer');

    function checkAndBoot() {
        const now = new Date().getTime();
        if (now > EXPIRE_NORMAL) {
            showExpiryError();
        } else {
            startLiveBoot();
        }
    }

    function showExpiryError() {
        container.innerHTML = "";
        document.getElementById('bootScreen').style.pointerEvents = "auto";
        
        const errorLines = [
            { type: 'g', text: 'I/DEBUG   (  183): *** ROOT SYSTEM BOOT INITIALIZATION ***' },
            { type: 'd', text: 'D/AndroidRuntime( 5650): Checking server sync validation...' },
            { type: 'error-fatal', text: 'E/LiveBoot( 5650): (error,because the server has expiry)' },
            { type: 'error-fatal', text: 'E/LiveBoot( 5650): CRITICAL: System halt due to synchronization timeout.' }
        ];
        errorLines.forEach(log => {
            const line = document.createElement('div');
            line.className = `log-line ${log.type}`;
            line.innerText = log.text;
            container.appendChild(line);
        });

        document.getElementById('fatalContact').style.display = 'block';
    }

    function startLiveBoot() {
        const logTemplates = [
            { type: 'd', text: 'D/AndroidRuntime( 5650): >>>>>> AndroidRuntime START com.android.internal.os.RuntimeInit <<<<<<' },
            { type: 'd', text: 'D/AndroidRuntime( 5650): CheckJNI is OFF' },
            { type: 'w', text: 'W/sh      ( 5716): type=1400 audit(0.0:253): avc: denied { syslog_mod }' },
            { type: 'd', text: 'D/libEGL  ( 5650): loaded /system/lib/egl/libGLESv1_CM_adreno.so' }
        ];

        const bootTimer = setInterval(() => {
            const template = logTemplates[Math.floor(Math.random() * logTemplates.length)];
            const line = document.createElement('div');
            line.className = `log-line ${template.type}`;
            line.innerText = template.text;
            container.appendChild(line);

            if (container.children.length > 75) {
                container.removeChild(container.firstChild);
            }

            if (new Date().getTime() > EXPIRE_NORMAL) {
                clearInterval(bootTimer);
                showExpiryError();
            }
        }, 35);

        setTimeout(() => {
            clearInterval(bootTimer);
            document.body.classList.add("booted");
            setupSelectorButtons();
            document.body.classList.add("show-selector");
        }, 5000);
    }

    function setupSelectorButtons() {
        const now = new Date().getTime();
        
        if (now > EXPIRE_GAME) {
            const btnGame = document.getElementById('btnGameMode');
            btnGame.classList.add('disabled');
            document.getElementById('badgeGame').innerText = "Expired";
        }
        
        if (now > EXPIRE_NORMAL) {
            const btnNormal = document.getElementById('btnNormalMode');
            btnNormal.classList.add('disabled');
            document.getElementById('badgeNormal').innerText = "Expired";
            
            const subBtns = document.querySelectorAll('.vmos-sub-btn');
            subBtns.forEach(btn => btn.classList.add('disabled'));
        }
    }

    function switchMenu(menuId) {
        document.querySelectorAll('.menu-panel').forEach(menu => menu.classList.remove('active'));
        document.getElementById(menuId).classList.add('active');
    }

    function launchVM(url) {
        document.getElementById('vmosFrame').src = url;
        document.body.classList.remove("show-selector");
    }

    checkAndBoot();
</script>

</body>
</html>
