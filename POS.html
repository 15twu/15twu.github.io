<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>跨 iPad 實時同步 POS 系統 (櫃檯自由加減菜單版)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background-color: #f8f9fa; height: 100vh; overflow: hidden; }
        
        .view { display: none; height: 100vh; flex-direction: column; }
        .active-view { display: flex; }

        /* 設定畫面 */
        .setup-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #34495e; color: white; }
        .btn-mode { padding: 25px 50px; font-size: 24px; font-weight: bold; margin: 20px; border: none; border-radius: 15px; cursor: pointer; color: white; width: 300px; }

        /* 客人點餐機 */
        header { background: #e74c3c; color: white; text-align: center; padding: 20px; font-size: 26px; font-weight: bold; }
        .kiosk-body { display: grid; grid-template-columns: 1fr 360px; flex: 1; overflow: hidden; }
        .menu-container { padding: 25px; overflow-y: auto; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .food-card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; }
        .food-card:active { background-color: #fff5f5; }
        .food-emoji { font-size: 45px; }
        .food-name { font-size: 18px; font-weight: bold; margin-top: 5px; }
        .food-price { color: #e74c3c; font-weight: bold; }
        .tray-panel { background: white; border-left: 2px solid #eee; display: flex; flex-direction: column; }
        .tray-header { padding: 15px; background: #2c3e50; color: white; text-align: center; font-size: 18px; }
        .tray-items { flex: 1; overflow-y: auto; padding: 15px; }
        .tray-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .checkout-footer { padding: 20px; border-top: 2px solid #eee; }
        .btn-checkout { width: 100%; background: #2ecc71; color: white; border: none; padding: 18px; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }
        
        /* 付款與加單通用彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 380px; }
        .btn-pay { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 8px; font-size: 18px; color: white; font-weight: bold; cursor: pointer; }

        /* 廚房大螢幕 */
        .kitchen-header { background: #27ae60; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .kitchen-body { flex: 1; padding: 20px; background: #111; overflow-y: auto; }
        .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .order-card { background: #222; border: 1px solid #333; border-radius: 8px; color: white; display: flex; flex-direction: column; overflow: hidden; }
        .order-title { background: #e67e22; padding: 10px; font-weight: bold; display: flex; justify-content: space-between; }
        .order-details { padding: 15px; flex: 1; font-size: 18px; }
        
        /* 廚房端加減食物按鈕 */
        .kitchen-item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px dashed #333; padding-bottom: 8px; }
        .kitchen-qty-controls { display: flex; align-items: center; gap: 8px; }
        .btn-kitchen-qty { width: 28px; height: 28px; border-radius: 50%; border: none; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn-kitchen-minus { background: #e74c3c; color: white; }
        .btn-kitchen-plus { background: #2ecc71; color: white; }
        
        /* 廚房卡片內新增食物按鈕 */
        .btn-kitchen-add-food { width: 90%; margin: 5px auto 15px auto; background: #34495e; color: #ecf0f1; border: 1px dashed #555; padding: 8px; font-size: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-kitchen-add-food:active { background: #2c3e50; }
    </style>
</head>
<body>

    <div id="setupView" class="view active-view">
        <div class="setup-screen">
            <h1 style="margin-bottom: 10px;">請設定此部 iPad 的用途</h1>
            <p style="color: #ccc; margin-bottom: 30px;">（不同 iPad 選擇不同模式進行實時同步）</p>
            <button class="btn-mode" style="background: #e74c3c;" onclick="initRole('kiosk')">🛒 門口客人點餐機</button>
            <button class="btn-mode" style="background: #27ae60;" onclick="initRole('kitchen')">👨‍🍳 廚房出餐大螢幕</button>
        </div>
    </div>

    <div id="kioskView" class="view">
        <header>請觸碰螢幕點餐 | Touch to Order</header>
        <div class="kiosk-body">
            <main class="menu-container">
                <div class="menu-grid">
                    <div class="food-card" onclick="addToTray('🍔 巨無霸漢堡', 45)">
                        <div class="food-emoji">🍔</div><div class="food-name">巨無霸漢堡</div><div class="food-price">$45</div>
                    </div>
                    <div class="food-card" onclick="addToTray('🍟 大薯條', 22)">
                        <div class="food-emoji">🍟</div><div class="food-name">大薯條</div><div class="food-price">$22</div>
                    </div>
                    <div class="food-card" onclick="addToTray('🥤 大可樂', 18)">
                        <div class="food-emoji">🥤</div><div class="food-name">大可樂</div><div class="food-price">$18</div>
                    </div>
                </div>
            </main>
            <aside class="tray-panel">
                <div class="tray-header">🛒 我的餐點</div>
                <div class="tray-items" id="trayItems"><p style="color:#aaa; text-align:center; margin-top:30px;">購物車是空的</p></div>
                <div class="checkout-footer">
                    <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:bold; margin-bottom:15px;">
                        <span>總計:</span><span id="totalPrice" style="color:#e74c3c;">$0</span>
                    </div>
                    <button class="btn-checkout" onclick="openPayment()">👉 前往付款</button>
                </div>
            </aside>
        </div>
    </div>

    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <h3>請選擇付款方式</h3>
            <p id="modalTotal" style="font-size:28px; color:#e74c3c; font-weight:bold; margin:15px 0;">$0</p>
            <button class="btn-pay" style="background:#f39c12;" onclick="processPay('八達通')">💳 八達通</button>
            <button class="btn-pay" style="background:#ff5b5b;" onclick="processPay('PayMe')">📱 PayMe</button>
            <button style="background:none; border:none; margin-top:10px; color:#999; text-decoration:underline;" onclick="document.getElementById('paymentModal').style.display='none'">返回修改</button>
        </div>
    </div>

    <div id="kitchenView" class="view">
        <div class="kitchen-header">
            <h2>👨‍🍳 櫃檯/廚房出餐管理 (實時雲端訂單)</h2>
            <div style="font-size: 14px; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 20px;">🟢 已連線至 Firebase</div>
        </div>
        <div class="kitchen-body">
            <div class="orders-grid" id="kitchenOrdersGrid">
                <div style="color:#555; font-size:20px; text-align:center; width:100%; margin-top:50px;">目前沒有待處理訂單</div>
            </div>
        </div>
    </div>

    <div class="modal" id="kitchenAddFoodModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px;">櫃檯補加食物</h3>
            <div id="kitchenFoodMenuOptions">
                </div>
            <button style="background:none; border:none; margin-top:15px; color:#999; text-decoration:underline;" onclick="document.getElementById('kitchenAddFoodModal').style.display='none'">取消</button>
        </div>
    </div>

    <script>
        // 使用你的 Firebase 網址
        const firebaseConfig = {
            databaseURL: "https://myipadpos-273f7-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // 統一定義基礎菜單（Kiosk 同 櫃檯廚房共用呢個數據清單）
        const masterMenu = [
            { name: "🍔 巨無霸漢堡", price: 45 },
            { name: "🍟 大薯條", price: 22 },
            { name: "🥤 大可樂", price: 18 }
        ];

        let tray = [];
        let rawOrdersData = {};
        let currentEditingFirebaseKey = ''; // 紀錄依家正係幫邊張單補加嘢食

        function initRole(role) {
            document.getElementById('setupView').style.display = 'none';
            if (role === 'kiosk') {
                document.getElementById('kioskView').classList.add('active-view');
            } else if (role === 'kitchen') {
                document.getElementById('kitchenView').classList.add('active-view');
                startKitchenListening();
                buildKitchenMenu(); // 生成廚房加單彈窗內容
            }
        }

        function addToTray(name, price) {
            const exist = tray.find(i => i.name === name);
            if (exist) { exist.qty++; } else { tray.push({ name, price, qty: 1 }); }
            renderTray();
        }

        function renderTray() {
            const container = document.getElementById('trayItems');
            if (tray.length === 0) {
                container.innerHTML = `<p style="color:#aaa; text-align:center; margin-top:30px;">購物車是空的</p>`;
                document.getElementById('totalPrice').innerText = "$0";
                return;
            }
            container.innerHTML = '';
            let total = 0;
            tray.forEach(item => {
                total += item.price * item.qty;
                container.innerHTML += `<div class="tray-item"><div><strong>${item.name}</strong><br><span style="color:#e74c3c;">$${item.price * item.qty}</span></div><div>x ${item.qty}</div></div>`;
            });
            document.getElementById('totalPrice').innerText = `$${total}`;
        }

        function openPayment() {
            if (tray.length === 0) return alert("購物車是空的！");
            document.getElementById('modalTotal').innerText = document.getElementById('totalPrice').innerText;
            document.getElementById('paymentModal').style.display = 'flex';
        }

        function processPay(method) {
            const orderNum = Math.floor(100 + Math.random() * 900);
            const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});

            const orderData = {
                orderNum: orderNum,
                items: tray,
                time: timeStr
            };

            database.ref('orders').push(orderData)
            .then(() => {
                alert(`【${method}】付款成功！\n您的號碼牌是：#${orderNum}\n\n廚房已同步收到訂單！🍟`);
                tray = [];
                renderTray();
                document.getElementById('paymentModal').style.display = 'none';
            })
            .catch(err => {
                alert("雲端連線失敗：" + err.message);
            });
        }

        // ================= 廚房端實時監聽與控制 =================
        function startKitchenListening() {
            database.ref('orders').on('value', (snapshot) => {
                const grid = document.getElementById('kitchenOrdersGrid');
                rawOrdersData = snapshot.val();
                
                if (!rawOrdersData) {
                    grid.innerHTML = `<div style="color:#555; font-size:20px; text-align:center; width:100%; margin-top:50px;">目前沒有待處理訂單</div>`;
                    return;
                }

                grid.innerHTML = '';
                Object.keys(rawOrdersData).forEach((firebaseKey) => {
                    const order = rawOrdersData[firebaseKey];
                    let itemsHtml = '';
                    
                    if (order.items) {
                        order.items.forEach((item, itemIndex) => {
                            itemsHtml += `
                                <div class="kitchen-item-row">
                                    <span><strong>${item.name}</strong></span>
                                    <div class="kitchen-qty-controls">
                                        <button class="btn-kitchen-qty btn-kitchen-minus" onclick="changeKitchenQty('${firebaseKey}', ${itemIndex}, -1)">-</button>
                                        <span style="font-weight:bold; min-width:20px; text-align:center;">${item.qty}</span>
                                        <button class="btn-kitchen-qty btn-kitchen-plus" onclick="changeKitchenQty('${firebaseKey}', ${itemIndex}, 1)">+</button>
                                    </div>
                                </div>
                            `;
                        });
                    }

                    grid.innerHTML += `
                        <div class="order-card" id="card-${firebaseKey}">
                            <div class="order-title">
                                <span>單號 #${order.orderNum}</span>
                                <span style="font-size:12px; opacity:0.8;">${order.time}</span>
                            </div>
                            <div class="order-details">
                                ${itemsHtml}
                            </div>
                            <button class="btn-kitchen-add-food" onclick="openKitchenAddFoodModal('${firebaseKey}')">➕ 幫客人加點其他食物</button>
                            <button style="width:100%; background:#2ecc71; color:white; border:none; padding:12px; font-weight:bold; cursor:pointer;" onclick="completeOrder('${firebaseKey}')">出餐完成</button>
                        </div>
                    `;
                });
            });
        }

        // 修改現有食物數量
        function changeKitchenQty(firebaseKey, itemIndex, amount) {
            let currentOrder = rawOrdersData[firebaseKey];
            if (!currentOrder || !currentOrder.items) return;

            currentOrder.items[itemIndex].qty += amount;

            if (currentOrder.items[itemIndex].qty <= 0) {
                currentOrder.items.splice(itemIndex, 1);
            }

            if (currentOrder.items.length === 0) {
                database.ref('orders/' + firebaseKey).remove();
            } else {
                database.ref('orders/' + firebaseKey).set(currentOrder);
            }
        }

        // 開啟廚房加新食物嘅彈窗
        function openKitchenAddFoodModal(firebaseKey) {
            currentEditingFirebaseKey = firebaseKey;
            document.getElementById('kitchenAddFoodModal').style.display = 'flex';
        }

        // 根據主菜單動態生成廚房加單按鈕
        function buildKitchenMenu() {
            const container = document.getElementById('kitchenFoodMenuOptions');
            container.innerHTML = '';
            masterMenu.forEach(prod => {
                container.innerHTML += `
                    <button class="btn-pay" style="background:#34495e; color:white; font-size:16px;" 
                        onclick="addBrandNewFoodToOrder('${prod.name}', ${prod.price})">
                        加點 ${prod.name} (+$${prod.price})
                    </button>
                `;
            });
        }

        // 核心邏輯：將一樣新嘅食物直接隊入去張雲端訂單度
        function addBrandNewFoodToOrder(foodName, foodPrice) {
            let currentOrder = rawOrdersData[currentEditingFirebaseKey];
            if (!currentOrder) return;

            if (!currentOrder.items) currentOrder.items = [];

            // 檢查張單入面係咪原本就已經有呢樣嘢，有的話直接加數量，冇的話 push 入去
            const existingItem = currentOrder.items.find(i => i.name === foodName);
            if (existingItem) {
                existingItem.qty++;
            } else {
                currentOrder.items.push({ name: foodName, price: foodPrice, qty: 1 });
            }

            // 同步返上雲端
            database.ref('orders/' + currentEditingFirebaseKey).set(currentOrder)
            .then(() => {
                document.getElementById('kitchenAddFoodModal').style.display = 'none';
            });
        }

        function completeOrder(firebaseKey) {
            database.ref('orders/' + firebaseKey).remove();
        }
    </script>
</body>
</html>
