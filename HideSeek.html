<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-Digit Code Multiplayer Hide & Seek</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        h1 { margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        .setup-panel {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: none;
            margin-bottom: 10px;
            width: 200px;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .status-banner {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 10px 30px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            text-align: center;
            min-width: 250px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 85px);
            grid-gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none; 
            opacity: 0.4;
        }

        .box {
            width: 85px;
            height: 85px;
            background-color: #1e293b;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            transition: all 0.2s;
        }

        .box:hover { background-color: #334155; transform: scale(1.05); }
        .box.revealed { background-color: #f8fafc; color: #0f172a; cursor: default; }
        .box.my-hide-spot { border: 3px solid #38bdf8; background-color: #0f172a; }

        #message { margin-top: 25px; font-size: 1.2rem; height: 30px; text-align: center;}
        
        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: #7dd3fc; }
        button.alt { background-color: #a855f7; color: white; }
        button.alt:hover { background-color: #c084fc; }
    </style>
</head>
<body>

    <h1>Online Hide & Seek</h1>
    
    <div class="setup-panel" id="setup-panel">
        <label style="display:block; margin-bottom: 8px;">Enter 6-Digit Room Code:</label>
        <input type="text" id="room-code" maxlength="6" placeholder="e.g. 123456"><br>
        <div class="btn-group">
            <button onclick="startAsHost()">1. Host Room</button>
            <button class="alt" onclick="startAsGuest()">2. Join Room</button>
        </div>
    </div>

    <div class="status-banner" id="status-banner">Enter a code to start</div>
    <div class="grid" id="grid"></div>
    <div id="message">Create or join a room with your friend.</div>

    <script>
        const gridContainer = document.getElementById('grid');
        const statusBanner = document.getElementById('status-banner');
        const messageDisplay = document.getElementById('message');
        const setupPanel = document.getElementById('setup-panel');
        const codeInput = document.getElementById('room-code');

        const TOTAL_BOXES = 16;
        let peer = null;
        let conn = null;
        let myRole = ""; 
        let hiddenBoxIndex = -1;
        let isMyTurn = false;

        // Prefix ensures your code doesn't conflict with random people on the public server
        const PREFIX = "hns6x-"; 

        function startAsHost() {
            const code = codeInput.value.trim();
            if(code.length !== 6) return alert("Please enter a 6-digit code!");

            statusBanner.textContent = "Creating Room...";
            peer = new Peer(PREFIX + code);

            peer.on('open', () => {
                statusBanner.textContent = `Waiting for Player... (Code: ${code})`;
                messageDisplay.textContent = "Tell your friend to enter this code and click 'Join Room'";
            });

            peer.on('error', (err) => {
                if(err.type === 'unavailable-id') {
                    alert("This code room is already active! Try a different number.");
                    location.reload();
                }
            });

            peer.on('connection', (connection) => {
                conn = connection;
                setupConnection();
                
                // Host picks roles randomly
                myRole = Math.random() < 0.5 ? "Hider" : "Seeker";
                conn.send({ type: 'START_GAME', role: myRole === "Hider" ? "Seeker" : "Hider" });
                beginRound();
            });
        }

        function startAsGuest() {
            const code = codeInput.value.trim();
            if(code.length !== 6) return alert("Please enter a 6-digit code!");

            statusBanner.textContent = "Connecting...";
            peer = new Peer(); // Guest gets a temporary id

            peer.on('open', () => {
                conn = peer.connect(PREFIX + code);
                setupConnection();
            });
        }

        function setupConnection() {
            conn.on('open', () => {
                setupPanel.style.display = 'none';
                statusBanner.textContent = "CONNECTED 🟢";
            });

            conn.on('data', (data) => {
                if (data.type === 'START_GAME') {
                    myRole = data.role;
                    beginRound();
                } else if (data.type === 'HIDER_READY') {
                    if (myRole === "Seeker") {
                        isMyTurn = true;
                        messageDisplay.textContent = "Your friend has hidden! Tap a box to find them.";
                    }
                } else if (data.type === 'GUESS') {
                    handleIncomingGuess(data.index);
                } else if (data.type === 'GUESS_RESULT') {
                    const targetedBox = gridContainer.children[data.index];
                    targetedBox.textContent = '❌';
                    targetedBox.classList.add('revealed');
                    messageDisplay.textContent = "Missed! Your friend is safe. Waiting for next turn...";
                } else if (data.type === 'GAME_OVER_WIN') {
                    const targetedBox = gridContainer.children[data.index];
                    targetedBox.textContent = '🎉';
                    targetedBox.classList.add('revealed');
                    messageDisplay.textContent = "You found them! You Win!";
                    statusBanner.textContent = "🏆 VICTORY!";
                }
            });
        }

        function beginRound() {
            gridContainer.innerHTML = '';
            gridContainer.style.pointerEvents = 'auto';
            gridContainer.style.opacity = '1';

            for (let i = 0; i < TOTAL_BOXES; i++) {
                const box = document.createElement('div');
                box.classList.add('box');
                box.dataset.index = i;
                box.addEventListener('click', handleBoxClick);
                gridContainer.appendChild(box);
            }

            if (myRole === "Hider") {
                statusBanner.textContent = "🙈 YOU ARE HIDING";
                statusBanner.style.backgroundColor = "#b45309";
                messageDisplay.textContent = "Pick a box to hide in!";
                isMyTurn = true; 
            } else {
                statusBanner.textContent = "🔍 YOU ARE SEEKING";
                statusBanner.style.backgroundColor = "#0369a1";
                messageDisplay.textContent = "Waiting for your friend to hide...";
                isMyTurn = false;
            }
        }

        function handleBoxClick(event) {
            if (!isMyTurn) return;
            const clickedBox = event.target;
            const clickedIndex = parseInt(clickedBox.dataset.index);

            if (myRole === "Hider" && hiddenBoxIndex === -1) {
                hiddenBoxIndex = clickedIndex;
                clickedBox.classList.add('my-hide-spot');
                clickedBox.textContent = '👤';
                messageDisplay.textContent = "Spot locked in! Waiting for your friend to guess...";
                isMyTurn = false;
                conn.send({ type: 'HIDER_READY' });
            } 
            else if (myRole === "Seeker") {
                if (clickedBox.classList.contains('revealed')) return;
                isMyTurn = false;
                messageDisplay.textContent = "Checking box...";
                conn.send({ type: 'GUESS', index: clickedIndex });
            }
        }

        function handleIncomingGuess(index) {
            const targetedBox = gridContainer.children[index];
            
            if (myRole === "Hider") {
                if (index === hiddenBoxIndex) {
                    targetedBox.textContent = '💥';
                    targetedBox.classList.add('revealed');
                    messageDisplay.textContent = "Oh no! They found you! Game Over.";
                    statusBanner.textContent = "💀 CAUGHT!";
                    conn.send({ type: 'GAME_OVER_WIN', index: index });
                } else {
                    targetedBox.textContent = '❌';
                    targetedBox.classList.add('revealed');
                    messageDisplay.textContent = "They guessed wrong! Your turn to wait.";
                    isMyTurn = true; 
                    conn.send({ type: 'GUESS_RESULT', index: index });
                }
            }
        }
    </script>
</body>
</html>
